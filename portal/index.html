<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銓宏國際 - 主系統入口</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .cards {
            display: grid;
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            gap: 30px;
            align-items: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        
        .qr-code {
            flex-shrink: 0;
            width: 150px;
            height: 150px;
            background: #f5f5f5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .qr-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .card-content {
            flex: 1;
        }
        
        .card-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .card h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .url-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .url-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 13px;
            color: #667eea;
            font-family: monospace;
        }
        
        .url-box input:focus {
            outline: none;
        }
        
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .copy-btn:hover {
            background: #5a6fd6;
        }
        
        .btn-primary {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            margin-top: 40px;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .card {
                flex-direction: column;
                text-align: center;
            }
            
            .qr-code {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 銓宏國際</h1>
            <p>主系統入口 - QR Code 掃描即可進入</p>
        </div>
        
        <div class="cards">
            <!-- 總控制台 -->
            <div class="card">
                <div class="qr-code">
                    <img src="dashboard.png" alt="總控制台 QR Code">
                </div>
                <div class="card-content">
                    <div class="card-icon">🎛️</div>
                    <h2>總控制台</h2>
                    <p>AI Agent 管理、KPI 績效、系統監控</p>
                    <div class="url-box">
                        <input type="text" value="https://wugys.github.io/chuanhung-projects/dashboard/" readonly id="url1">
                        <button class="copy-btn" onclick="copyUrl('url1')">複製</button>
                    </div>
                    <a href="https://wugys.github.io/chuanhung-projects/dashboard/" class="btn-primary" target="_blank">進入系統 →</a>
                </div>
            </div>
            
            <!-- 專案管理中心 -->
            <div class="card">
                <div class="qr-code">
                    <img src="project-management.png" alt="專案管理中心 QR Code">
                </div>
                <div class="card-content">
                    <div class="card-icon">📊</div>
                    <h2>專案管理中心</h2>
                    <p>專案追蹤、甘特圖、進度回報</p>
                    <div class="url-box">
                        <input type="text" value="https://wugys.github.io/chuanhung-projects/dashboard/project-management/" readonly id="url2">
                        <button class="copy-btn" onclick="copyUrl('url2')">複製</button>
                    </div>
                    <a href="https://wugys.github.io/chuanhung-projects/dashboard/project-management/" class="btn-primary" target="_blank">進入系統 →</a>
                </div>
            </div>
            
            <!-- 1688 AI 提案系統 -->
            <div class="card">
                <div class="qr-code">
                    <img src="1688-ai.png" alt="1688 AI QR Code">
                </div>
                <div class="card-content">
                    <div class="card-icon">🤖</div>
                    <h2>1688 AI 提案系統</h2>
                    <p>智能產品搜尋、報價分析、提案生成</p>
                    <div class="url-box">
                        <input type="text" value="https://wugys.github.io/chuanhung-projects/1688-ai-proposal-system.html" readonly id="url3">
                        <button class="copy-btn" onclick="copyUrl('url3')">複製</button>
                    </div>
                    <a href="https://wugys.github.io/chuanhung-projects/1688-ai-proposal-system.html" class="btn-primary" target="_blank">進入系統 →</a>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 銓宏國際有限公司 | 掃描 QR Code 或點擊連結進入系統</p>
        </div>
    </div>
    
    <script>
        function copyUrl(id) {
            const input = document.getElementById(id);
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value);
            
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '已複製!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        }
    </script>
</body>
</html>
