<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 登入測試</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto;">
    <h1>🔐 Supabase 登入測試</h1>
    
    <div id="status" style="background: #f3f4f6; padding: 15px; border-radius: 8px; margin: 20px 0;">
        載入中...
    </div>
    
    <div id="login-form" style="display: none;">
        <h3>登入測試</h3>
        <input type="text" id="username" placeholder="帳號 (如: wugys)" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;"><br>
        <input type="password" id="password" placeholder="密碼" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;"><br>
        <button onclick="testLogin()" style="width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer;">
            測試登入
        </button>
    </div>
    
    <div id="result" style="margin-top: 20px; font-family: monospace; font-size: 12px; white-space: pre-wrap;"></div>

    <script>
        const SUPABASE_URL = 'https://djvyozmdenvzlbyieyss.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqdnlvem1kZW52emxieWlleXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTA1ODcsImV4cCI6MjA4OTY4NjU4N30.xc33MXQmbNph4EcFHwNbmai3dXDanIj2VKStJ6Xy2Tg';
        
        let supabase = null;
        
        async function init() {
            const statusEl = document.getElementById('status');
            const resultEl = document.getElementById('result');
            
            try {
                // 檢查 Supabase 庫
                if (!window.supabase) {
                    statusEl.innerHTML = '❌ Supabase 庫未載入';
                    statusEl.style.background = '#fee2e2';
                    return;
                }
                
                resultEl.textContent += '✅ Supabase 庫已載入\n';
                
                // 初始化客戶端
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                resultEl.textContent += '✅ Supabase 客戶端已初始化\n';
                
                // 檢查現有會話
                const { data: { session }, error } = await supabase.auth.getSession();
                if (error) {
                    resultEl.textContent += '❌ 檢查會話失敗: ' + error.message + '\n';
                } else if (session) {
                    resultEl.textContent += '✅ 已有登入會話: ' + session.user.email + '\n';
                    statusEl.innerHTML = '✅ 已登入: ' + session.user.email;
                    statusEl.style.background = '#d1fae5';
                } else {
                    resultEl.textContent += 'ℹ️ 無現有會話，請登入\n';
                    statusEl.innerHTML = 'ℹ️ 請輸入帳號密碼登入';
                    document.getElementById('login-form').style.display = 'block';
                }
                
            } catch (error) {
                statusEl.innerHTML = '❌ 初始化失敗: ' + error.message;
                statusEl.style.background = '#fee2e2';
                resultEl.textContent += '❌ 錯誤: ' + error.stack + '\n';
            }
        }
        
        async function testLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const resultEl = document.getElementById('result');
            const statusEl = document.getElementById('status');
            
            if (!username || !password) {
                alert('請輸入帳號和密碼');
                return;
            }
            
            const email = username.includes('@') ? username : `${username}@chuanhung.local`;
            
            resultEl.textContent += `\n🔄 嘗試登入: ${email}\n`;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    resultEl.textContent += '❌ 登入失敗: ' + error.message + '\n';
                    statusEl.innerHTML = '❌ 登入失敗: ' + error.message;
                    statusEl.style.background = '#fee2e2';
                } else {
                    resultEl.textContent += '✅ 登入成功!\n';
                    resultEl.textContent += '👤 使用者: ' + data.user.email + '\n';
                    resultEl.textContent += '📋 角色: ' + (data.user.user_metadata?.role || '未設定') + '\n';
                    resultEl.textContent += '🔑 Access Token: ' + data.session.access_token.substring(0, 20) + '...\n';
                    statusEl.innerHTML = '✅ 登入成功: ' + data.user.email;
                    statusEl.style.background = '#d1fae5';
                }
                
            } catch (error) {
                resultEl.textContent += '❌ 錯誤: ' + error.message + '\n';
                statusEl.innerHTML = '❌ 錯誤: ' + error.message;
                statusEl.style.background = '#fee2e2';
            }
        }
        
        // 頁面載入時初始化
        window.onload = init;
    </script>
</body>
</html>
